<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Portfolio (Local)</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=1" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script src="app.js?v=1"></script>
    <script>
      // Render after the precompiled script is loaded.
      function attemptRender(retries = 15, delay = 120) {
        const mount = document.getElementById('root');
        if (!mount) return;

        if (window.Portfolio && window.ReactDOM) {
          try {
            const root = ReactDOM.createRoot(mount);
            root.render(React.createElement(window.Portfolio));
            console.log('Portfolio rendered successfully.');
            return;
          } catch (err) {
            console.error('Render error:', err);
            mount.innerText = 'Render error: ' + err.message;
            return;
          } 
        }

        if (retries > 0) {
          setTimeout(() => attemptRender(retries - 1, delay), delay);
          return;
        }

        mount.innerText = 'Could not load the app. Run npm run build and refresh.';
        console.error('Portfolio not found on window after waiting.');
      }

      attemptRender();
    </script>
  </body>
</html>
