<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">E-Commerce Store</title>
  <desc id="desc">Light shopping landing page inspired by the screenshot with white rounded cards and blue accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e8eefb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <rect x="96" y="28" width="1008" height="1" fill="#cbd5e1" opacity="0.75"/>

  <rect x="94" y="30" width="1008" height="86" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <circle cx="126" cy="71" r="7" fill="#0ea5e9"/>
  <circle cx="136" cy="71" r="7" fill="#2563eb" opacity="0.85"/>
  <text x="150" y="76" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Velora Market</text>
  <text x="150" y="98" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="14">Responsive shopping, cart, payment, auth</text>
  <rect x="458" y="50" width="72" height="42" rx="21" fill="#dbeafe"/>
  <text x="477" y="77" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="16">Home</text>
  <text x="566" y="77" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="16">Products</text>
  <text x="670" y="77" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="16">Orders</text>
  <text x="763" y="77" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="16">Account</text>
  <rect x="862" y="42" width="68" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="942" y="42" width="80" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="1032" y="42" width="88" height="44" rx="22" fill="url(#blue)"/>
  <text x="882" y="70" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Cart</text>
  <text x="960" y="70" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Sign in</text>
  <text x="1051" y="70" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Register</text>

  <rect x="94" y="140" width="1008" height="256" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="118" y="186" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="3">SIMPLE STORE</text>
  <text x="118" y="256" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">Products first, register</text>
  <text x="118" y="312" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">easy, checkout simple.</text>
  <text x="118" y="352" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="18">A basic shopping page with local product images and a direct sign up path.</text>
  <rect x="958" y="206" width="104" height="46" rx="23" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="985" y="235" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Register</text>
  <rect x="1072" y="206" width="68" height="46" rx="23" fill="url(#blue)"/>
  <text x="1090" y="235" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Cart</text>

  <rect x="94" y="420" width="1008" height="122" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="118" y="475" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="3">FEATURED</text>
  <text x="118" y="506" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Some products</text>
  <rect x="1012" y="454" width="92" height="46" rx="23" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="1032" y="483" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">View all</text>

  <rect x="94" y="562" width="1008" height="172" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="118" y="612" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="3">PRODUCTS</text>
  <text x="118" y="644" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">All products</text>
  <rect x="118" y="664" width="58" height="46" rx="23" fill="#2563eb"/>
  <text x="136" y="693" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">All</text>
  <rect x="730" y="604" width="418" height="46" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="746" y="633" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="16">Search products</text>
  <rect x="118" y="726" width="372" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="510" y="726" width="260" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="790" y="726" width="186" height="12" rx="6" fill="#e2e8f0"/>
</svg>
